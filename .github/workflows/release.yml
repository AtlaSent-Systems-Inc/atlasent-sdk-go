name: release

# Cut a release by pushing a semver tag:
#
#   git tag v0.5.0 && git push origin v0.5.0
#
# Go modules are consumed directly from source via the tag — there is
# no artifact to publish. This workflow exists for two things:
#
#   1. Fail fast if a tagged commit doesn't build / test clean.
#   2. Verify the ldflags-injected Version matches the git tag so the
#      User-Agent the SDK sends in production matches what proxy-log
#      greps will see.
#
# Consumers then run:
#   go get github.com/atlasent-systems-inc/atlasent-sdk-go/atlasent@v0.5.0

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to validate (e.g. v0.5.0)"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Derive version from tag
        id: version
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Tag ${ref} → Version ${version}"

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: Verify Version is injected correctly
        run: |
          set -euo pipefail
          # Build a probe that prints the ldflags-injected Version.
          cat > /tmp/probe.go <<'EOF'
          package main
          import (
            "fmt"
            "github.com/atlasent-systems-inc/atlasent-sdk-go/atlasent"
          )
          func main() { fmt.Print(atlasent.Version) }
          EOF
          mkdir -p /tmp/probe
          mv /tmp/probe.go /tmp/probe/main.go
          cd /tmp/probe
          cat > go.mod <<EOF
          module probe
          go 1.22
          require github.com/atlasent-systems-inc/atlasent-sdk-go v0.0.0
          replace github.com/atlasent-systems-inc/atlasent-sdk-go => ${GITHUB_WORKSPACE}
          EOF
          go mod tidy
          got=$(go run -ldflags="-X github.com/atlasent-systems-inc/atlasent-sdk-go/atlasent.Version=${{ steps.version.outputs.version }}" ./...)
          if [ "$got" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::expected Version=${{ steps.version.outputs.version }}, got Version=${got}"
            exit 1
          fi
          echo "Version injection OK: ${got}"
