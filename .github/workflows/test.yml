name: Test

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        run: go test -race -count=1 ./...
      - name: go test (no-race fallback, coverage)
        run: go test -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: upload coverage
        if: matrix.go == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go }}
          path: coverage.out

  staging-integration:
    name: staging integration
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    concurrency:
      group: atlasent-staging-integration
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
      - name: Run integration tests against staging
        env:
          ATLASENT_STAGING_BASE_URL: ${{ secrets.ATLASENT_STAGING_BASE_URL }}
          ATLASENT_STAGING_API_KEY: ${{ secrets.ATLASENT_STAGING_API_KEY }}
        run: |
          if [ -z "${ATLASENT_STAGING_API_KEY}" ]; then
            echo "Skipping: ATLASENT_STAGING_API_KEY not configured on this branch."
            exit 0
          fi
          go test -race -count=1 -tags=integration ./atlasent/...
