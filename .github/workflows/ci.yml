name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "grpc"
          - "connectrpc"
          - "otel"
          - "cacheredis"
          - "middleware/gin"
          - "middleware/echo"
          - "middleware/fiber"
          - "examples/grpc"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test -race
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck main module
        run: staticcheck ./...
      - name: staticcheck submodules
        run: |
          for m in grpc connectrpc otel cacheredis middleware/gin middleware/echo middleware/fiber; do
            echo "==> $m"
            (cd "$m" && staticcheck ./...)
          done

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck main module
        run: govulncheck ./...
      - name: govulncheck submodules
        run: |
          for m in grpc connectrpc otel cacheredis middleware/gin middleware/echo middleware/fiber; do
            echo "==> $m"
            (cd "$m" && govulncheck ./...)
          done
